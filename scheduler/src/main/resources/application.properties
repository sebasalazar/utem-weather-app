spring.application.name=schCMutem
minsal.farmacias.base.url=https://midas.minsal.cl/farmacia_v2/WS

spring.servlet.encoding.enabled=true
spring.servlet.encoding.charset=UTF-8
spring.servlet.encoding.force=true

#
# Base de datos
#
spring.datasource.url = jdbc:postgresql:utemdb
spring.datasource.username=cm
spring.datasource.password=Utem,2026
spring.jpa.hibernate.ddl-auto=validate

# ==============================================================================
# Configuraci\u00f1on del Pool de Hilos para @Scheduled (Spring Boot Task Scheduling)
# ==============================================================================

# Prefijo para identificaci\u00f3n de hilos en logs, thread dumps y m\u00e9tricas de observabilidad
spring.task.scheduling.thread-name-prefix=schcm-

# Tama\u00f1o expl\u00edcito del pool de hilos (por defecto: 1)
# Ajustar seg\u00fan f\u00f3rmula I/O-bound: N_cores * utilization * (1 + wait_time/compute_time)
spring.task.scheduling.pool.size=17

# Habilita espera ordenada durante el shutdown del ApplicationContext
spring.task.scheduling.shutdown.await-termination=true

# Tiempo m\u00e1ximo de espera para finalizaci\u00f3n de tarea
spring.task.scheduling.shutdown.await-termination-period=60s

scheduler.hour.task = PT1H
